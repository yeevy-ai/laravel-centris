name: Yeevy

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  yeevy:
    # Cheap guard so runners only spin up for actual mentions
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@yeevy-ai')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@yeevy-ai')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@yeevy-ai')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@yeevy-ai') || contains(github.event.issue.title, '@yeevy-ai')))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ca-central-1

      - name: Run Yeevy
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@yeevy-ai"
          use_bedrock: "true"
          claude_args: '--model us.anthropic.claude-sonnet-4-6'
